<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} | Helping Small Businesses Compete Like Giants{% endif %}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <link rel="icon" type="image/png" href="{{ '/logo.png' | relative_url }}">
    <style>
        /* ========== RESET & BASE ========== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Arial Black', 'Arial Bold', Gadget, sans-serif;
            color: #000029;
            background: #FFFFFF;
            line-height: 1.6;
            overflow-x: hidden;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* ========== DIAGONAL STRIPE PATTERNS ========== */
        .stripe-bg-green {
            background: repeating-linear-gradient(
                -45deg,
                #00cd91,
                #00cd91 10px,
                #00b880 10px,
                #00b880 20px
            );
        }

        .stripe-bg-dark {
            background: repeating-linear-gradient(
                -45deg,
                #000029,
                #000029 10px,
                #000835 10px,
                #000835 20px
            );
        }

        .stripe-bg-light {
            background: repeating-linear-gradient(
                -45deg,
                #f0f0f0,
                #f0f0f0 10px,
                #e8e8e8 10px,
                #e8e8e8 20px
            );
        }

        /* ========== TYPOGRAPHY ========== */
        h1, h2, h3, h4 {
            font-family: 'Arial Black', 'Arial Bold', Gadget, sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1.2;
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            letter-spacing: 5px;
        }

        h2 {
            font-size: clamp(1.8rem, 4vw, 3rem);
            margin-bottom: 1rem;
        }

        h3 {
            font-size: clamp(1.2rem, 2.5vw, 1.6rem);
            letter-spacing: 2px;
        }

        p {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 400;
        }

        /* ========== CONTAINER ========== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ========== NAVIGATION ========== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #FFFFFF;
            border-bottom: 6px solid #000029;
            border-top: 4px solid #00cd91;
            padding: 0 2rem;
            box-shadow: 0 4px 12px rgba(0, 0, 41, 0.1);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo img {
            height: 50px;
            width: auto;
        }

        .nav-logo span {
            color: #000029;
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: #000029;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.2s;
            padding: 0.5rem 0;
        }

        .nav-links a:hover {
            color: #00cd91;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            width: 30px;
            height: 4px;
            background: #000029;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(7px, 7px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* ========== BUTTONS ========== */
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-family: 'Arial Black', 'Arial Bold', Gadget, sans-serif;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 6px solid #000029;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #00cd91;
            color: #000029;
            box-shadow: 6px 6px 0 #000029;
        }

        .btn-primary:hover {
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0 #000029;
        }

        .btn-primary:active {
            transform: translate(0, 0);
            box-shadow: 3px 3px 0 #000029;
        }

        .btn-white {
            background: #FFFFFF;
            color: #000029;
            box-shadow: 6px 6px 0 #00cd91;
            border-color: #000029;
        }

        .btn-white:hover {
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0 #00cd91;
        }

        /* ========== HERO ========== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 2rem 4rem;
            background: #e8f5f0;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 40px,
                rgba(0, 205, 145, 0.06) 40px,
                rgba(0, 205, 145, 0.06) 80px
            );
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 900px;
        }

        .hero-logo {
            width: min(500px, 80vw);
            margin-bottom: 2rem;
        }

        .hero h1 {
            color: #000029;
            margin-bottom: 1.5rem;
            text-shadow: 4px 4px 0 rgba(0, 205, 145, 0.2);
        }

        .hero p {
            color: #333333;
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            margin-bottom: 2.5rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
        }

        /* ========== SECTION COMMON ========== */
        section {
            padding: 6rem 0;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-header h2 {
            display: inline-block;
            background: #000029;
            color: #FFFFFF;
            padding: 0.8rem 2rem;
            border: 6px solid #000029;
            box-shadow: 8px 8px 0 #00cd91;
        }

        .section-header p {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            color: #333;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ========== SERVICES / CARDS ========== */
        #services {
            background: #f0f0f0;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .card {
            background: #FFFFFF;
            border: 6px solid #000029;
            box-shadow: 8px 8px 0 #000029;
            padding: 2.5rem 2rem;
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translate(-5px, -5px);
            box-shadow: 13px 13px 0 #000029;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .card h3 {
            margin-bottom: 1rem;
            color: #000029;
        }

        .card p {
            color: #333;
            font-size: 1rem;
            line-height: 1.7;
        }

        .card:nth-child(1) {
            border-top: 12px solid #00cd91;
        }

        .card:nth-child(2) {
            border-top: 12px solid #000029;
        }

        .card:nth-child(3) {
            border-top: 12px solid #00cd91;
        }

        /* ========== HOW IT WORKS ========== */
        #how-it-works {
            background: #FFFFFF;
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            counter-reset: step;
        }

        .step {
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: #00cd91;
            color: #000029;
            font-size: 2.5rem;
            font-weight: 900;
            border: 6px solid #000029;
            box-shadow: 6px 6px 0 #000029;
            margin-bottom: 1.5rem;
        }

        .step h3 {
            margin-bottom: 0.8rem;
            color: #000029;
        }

        .step p {
            color: #555;
            font-size: 1rem;
            line-height: 1.7;
        }

        /* ========== PROOF POINT ========== */
        #proof {
            background: #000029;
            color: #FFFFFF;
            position: relative;
            overflow: hidden;
        }

        #proof::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 20px,
                rgba(0, 205, 145, 0.05) 20px,
                rgba(0, 205, 145, 0.05) 40px
            );
        }

        .proof-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .proof-content h2 {
            color: #00cd91;
            margin-bottom: 2rem;
            box-shadow: none;
            background: none;
            padding: 0;
            border: none;
            display: block;
        }

        .proof-card {
            background: rgba(255, 255, 255, 0.05);
            border: 6px solid #00cd91;
            box-shadow: 8px 8px 0 #00cd91;
            padding: 3rem 2.5rem;
            margin-bottom: 2rem;
        }

        .proof-card p {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #ccc;
        }

        .proof-tagline {
            font-size: 1.3rem;
            color: #00cd91;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* ========== ABOUT ========== */
        #about {
            background: #f0f0f0;
            position: relative;
        }

        #about::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 30px,
                rgba(0, 0, 41, 0.02) 30px,
                rgba(0, 0, 41, 0.02) 60px
            );
        }

        .about-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        .about-box {
            background: #FFFFFF;
            border: 6px solid #000029;
            box-shadow: 10px 10px 0 #000029;
            padding: 3rem;
        }

        .about-box h3 {
            color: #000029;
            margin-bottom: 1rem;
        }

        .about-box p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #333;
            margin-bottom: 1.5rem;
        }

        .about-box p:last-child {
            margin-bottom: 0;
        }

        .about-highlight {
            background: #00cd91;
            color: #000029;
            padding: 1.5rem 2rem;
            border: 6px solid #000029;
            box-shadow: 6px 6px 0 #000029;
            margin-top: 2rem;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        /* ========== CONTACT ========== */
        #contact {
            position: relative;
            overflow: hidden;
        }

        #contact::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                -45deg,
                #00cd91,
                #00cd91 10px,
                #00b880 10px,
                #00b880 20px
            );
            z-index: 0;
        }

        .contact-inner {
            position: relative;
            z-index: 1;
        }

        .contact-inner .section-header h2 {
            background: #FFFFFF;
            color: #000029;
            box-shadow: 8px 8px 0 #000029;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        .contact-info {
            background: #000029;
            border: 6px solid #000029;
            box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.3);
            padding: 2.5rem;
            color: #FFFFFF;
        }

        .contact-info h3 {
            color: #00cd91;
            margin-bottom: 1.5rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            font-family: Arial, Helvetica, sans-serif;
        }

        .contact-item-icon {
            font-size: 1.5rem;
            min-width: 40px;
            text-align: center;
        }

        .contact-item a {
            color: #FFFFFF;
            transition: color 0.2s;
        }

        .contact-item a:hover {
            color: #00cd91;
        }

        .contact-form {
            background: #FFFFFF;
            border: 6px solid #000029;
            box-shadow: 10px 10px 0 #000029;
            padding: 2.5rem;
        }

        .contact-form h3 {
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.4rem;
            color: #000029;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1rem;
            border: 4px solid #000029;
            background: #f0f0f0;
            color: #000029;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00cd91;
            box-shadow: 4px 4px 0 #00cd91;
        }

        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .contact-form .btn {
            width: 100%;
            text-align: center;
            border: 6px solid #000029;
        }

        /* ========== FOOTER ========== */
        footer {
            background: #000029;
            color: #FFFFFF;
            text-align: center;
            padding: 3rem 2rem;
            border-top: 6px solid #00cd91;
        }

        footer p {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 0.5rem;
        }

        footer .tagline {
            color: #00cd91;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* ========== BLOG STYLES ========== */
        .blog-header {
            padding: 120px 2rem 3rem;
            background: #e8f5f0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .blog-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 40px,
                rgba(0, 205, 145, 0.06) 40px,
                rgba(0, 205, 145, 0.06) 80px
            );
        }

        .blog-header h1 {
            position: relative;
            z-index: 1;
            color: #000029;
            text-shadow: 4px 4px 0 rgba(0, 205, 145, 0.2);
        }

        .blog-list {
            padding: 4rem 0;
        }

        .blog-post-card {
            background: #FFFFFF;
            border: 6px solid #000029;
            box-shadow: 8px 8px 0 #000029;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            transition: all 0.2s ease;
        }

        .blog-post-card:hover {
            transform: translate(-3px, -3px);
            box-shadow: 11px 11px 0 #000029;
        }

        .blog-post-card h2 {
            display: block;
            background: none;
            color: #000029;
            padding: 0;
            border: none;
            box-shadow: none;
            margin-bottom: 0.5rem;
        }

        .blog-post-card h2 a {
            color: #000029;
            transition: color 0.2s;
        }

        .blog-post-card h2 a:hover {
            color: #00cd91;
        }

        .blog-post-card .post-date {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .blog-post-card .post-excerpt {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #333;
            margin-bottom: 1.5rem;
        }

        .blog-post-card .read-more {
            font-family: 'Arial Black', 'Arial Bold', Gadget, sans-serif;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00cd91;
            transition: color 0.2s;
        }

        .blog-post-card .read-more:hover {
            color: #000029;
        }

        /* ========== POST STYLES ========== */
        .post-header {
            padding: 120px 2rem 3rem;
            background: #e8f5f0;
            position: relative;
            overflow: hidden;
        }

        .post-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 40px,
                rgba(0, 205, 145, 0.06) 40px,
                rgba(0, 205, 145, 0.06) 80px
            );
        }

        .post-title-box {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            background: #FFFFFF;
            border: 6px solid #000029;
            box-shadow: 8px 8px 0 #000029;
            padding: 2.5rem;
            text-align: center;
        }

        .post-title-box h1 {
            color: #000029;
            font-size: clamp(1.8rem, 4vw, 3rem);
            margin-bottom: 0.5rem;
        }

        .post-title-box .post-date {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .post-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .post-content p {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.15rem;
            line-height: 1.9;
            color: #333;
            margin-bottom: 1.5rem;
        }

        .post-content h2 {
            display: block;
            background: none;
            color: #000029;
            padding: 0;
            border: none;
            box-shadow: none;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }

        .post-content h3 {
            margin-top: 2rem;
            margin-bottom: 0.8rem;
            color: #000029;
        }

        .post-content a {
            color: #00cd91;
            text-decoration: underline;
        }

        .post-content a:hover {
            color: #000029;
        }

        .post-content ul, .post-content ol {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.15rem;
            line-height: 1.9;
            color: #333;
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }

        .post-content blockquote {
            border-left: 6px solid #00cd91;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            background: #f0f0f0;
            font-family: Arial, Helvetica, sans-serif;
            font-style: italic;
            color: #555;
        }

        .post-back {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .post-back a {
            font-family: 'Arial Black', 'Arial Bold', Gadget, sans-serif;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00cd91;
            transition: color 0.2s;
        }

        .post-back a:hover {
            color: #000029;
        }

        /* ========== ROADMAP ========== */
        .roadmap-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .roadmap-item {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
            background: #FFFFFF;
            border: 6px solid #000029;
            box-shadow: 8px 8px 0 #000029;
            padding: 2rem;
            transition: all 0.2s ease;
        }

        .roadmap-item:hover {
            transform: translate(-3px, -3px);
            box-shadow: 11px 11px 0 #000029;
        }

        .roadmap-item.done {
            border-left: 12px solid #00cd91;
        }

        .roadmap-item.in-progress {
            border-left: 12px solid #f0ad4e;
        }

        .roadmap-item.planned {
            border-left: 12px solid #888;
        }

        .roadmap-check {
            font-size: 1.8rem;
            min-width: 40px;
            text-align: center;
            padding-top: 0.2rem;
        }

        .roadmap-detail h3 {
            margin-bottom: 0.5rem;
            color: #000029;
        }

        .roadmap-detail p {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1rem;
            line-height: 1.7;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .roadmap-date {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* ========== MOBILE ========== */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;

    <!-- ========== JS ========== -->
    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
            document.getElementById('hamburger').classList.toggle('active');
        }

        function closeMenu() {
            document.getElementById('navLinks').classList.remove('active');
            document.getElementById('hamburger').classList.remove('active');
        }

        // Close menu on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeMenu();
        });

        // Navbar shadow on scroll
        window.addEventListener('scroll', function() {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.style.boxShadow = '0 4px 20px rgba(0, 0, 0, 0.3)';
            } else {
                nav.style.boxShadow = 'none';
            }
        });
    </script>
