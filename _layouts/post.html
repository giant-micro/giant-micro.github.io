---
layout: default
---

<div class="post-header">
    <div class="post-title-box">
        <h1>{{ page.title }}</h1>
        <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
    </div>
</div>

<div class="post-content">
    {{ content }}
</div>

<div class="post-back">
    <a href="{{ '/blog/' | relative_url }}">← Back to Blog</a>
</div>
